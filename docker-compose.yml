services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: raseliniste_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: raseliniste
      POSTGRES_USER: raseliniste
      POSTGRES_PASSWORD: ${DB_PASSWORD:?required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data_v1:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raseliniste"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # GitHub username + repo lowercase. Po prvním buildu ghcr.io/duchnotvor/raseliniste/app
    image: ghcr.io/duchnotvor/raseliniste/app:latest
    container_name: raseliniste_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://raseliniste:${DB_PASSWORD}@postgres:5432/raseliniste
      SESSION_SECRET: ${SESSION_SECRET:?required}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Vertex AI (pokud VERTEX_PROJECT je vyplněný, má přednost před GEMINI_API_KEY)
      VERTEX_PROJECT: ${VERTEX_PROJECT:-}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-europe-west1}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/app/gcp-key.json}
      APP_URL: ${APP_URL:-https://www.raseliniste.cz}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      NOTIFICATION_FROM: ${NOTIFICATION_FROM:-}
      NOTIFICATION_EMAIL: ${NOTIFICATION_EMAIL:-}
      CRON_SECRET: ${CRON_SECRET:-}
      # Google OAuth (Calendar + People API)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://www.raseliniste.cz/api/integrations/google/callback}
      # Booking magic-link
      BOOKING_MAGIC_LINK_SECRET: ${BOOKING_MAGIC_LINK_SECRET:-}
      BOOKING_MAGIC_LINK_TTL_HOURS: ${BOOKING_MAGIC_LINK_TTL_HOURS:-24}
      # Siri Shortcut (calendar check)
      SIRI_API_TOKEN: ${SIRI_API_TOKEN:-}
      UPLOADS_PATH: /data/uploads
      CACHE_PATH: /data/cache
      NODE_ENV: production
    volumes:
      - ./uploads:/data/uploads
      - app_cache:/data/cache
      # Vertex AI service-account JSON. Pokud soubor neexistuje, Docker
      # při startu failne — záměrně. Buď tam ten klíč dej, nebo tenhle
      # řádek zakomentuj (pak pojede GEMINI_API_KEY fallback).
      - ./gcp-key.json:/app/gcp-key.json:ro
    ports:
      - "3333:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data_v1:
  app_cache:
