<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="B&W Myš">
  <defs>
    <radialGradient id="bw-bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#2a2a3a"/>
      <stop offset="60%" stop-color="#1a1a25"/>
      <stop offset="100%" stop-color="#08081c"/>
    </radialGradient>
    <linearGradient id="bw-arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#fbcfe8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Pozadí -->
  <rect width="180" height="180" fill="url(#bw-bg)"/>

  <!-- Velká obousměrná šipka uprostřed -->
  <g stroke="url(#bw-arrow)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="55" y1="90" x2="125" y2="90"/>
    <!-- levá šipka -->
    <polyline points="70,75 55,90 70,105"/>
    <!-- pravá šipka -->
    <polyline points="110,75 125,90 110,105"/>
  </g>

  <!-- ČERNÁ MYŠ — levý dolní roh -->
  <g transform="translate(20, 122)">
    <!-- tělo -->
    <ellipse cx="18" cy="18" rx="18" ry="13" fill="#0d0d12" stroke="#3a3a4a" stroke-width="1"/>
    <!-- hlava -->
    <circle cx="32" cy="12" r="9" fill="#0d0d12" stroke="#3a3a4a" stroke-width="1"/>
    <!-- uši -->
    <circle cx="28" cy="5" r="4" fill="#0d0d12" stroke="#3a3a4a" stroke-width="1"/>
    <circle cx="36" cy="5" r="4" fill="#0d0d12" stroke="#3a3a4a" stroke-width="1"/>
    <!-- nos -->
    <circle cx="39" cy="13" r="1.3" fill="#fbcfe8"/>
    <!-- oko -->
    <circle cx="34" cy="11" r="1.1" fill="#fff"/>
    <!-- ocas zatočený doleva -->
    <path d="M 2 22 Q -6 14 -2 4" stroke="#0d0d12" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- BÍLÁ MYŠ — pravý horní roh, zrcadlená -->
  <g transform="translate(160, 50) scale(-1, 1)">
    <!-- tělo -->
    <ellipse cx="18" cy="18" rx="18" ry="13" fill="#f4f4f6" stroke="#c8c8d0" stroke-width="1"/>
    <!-- hlava -->
    <circle cx="32" cy="12" r="9" fill="#f4f4f6" stroke="#c8c8d0" stroke-width="1"/>
    <!-- uši -->
    <circle cx="28" cy="5" r="4" fill="#f4f4f6" stroke="#c8c8d0" stroke-width="1"/>
    <circle cx="36" cy="5" r="4" fill="#f4f4f6" stroke="#c8c8d0" stroke-width="1"/>
    <!-- nos -->
    <circle cx="39" cy="13" r="1.3" fill="#a78bfa"/>
    <!-- oko -->
    <circle cx="34" cy="11" r="1.1" fill="#1a1a25"/>
    <!-- ocas -->
    <path d="M 2 22 Q -6 14 -2 4" stroke="#c8c8d0" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
