<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="B&W Myš">
  <defs>
    <radialGradient id="bw-bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#2a2a3a"/>
      <stop offset="60%" stop-color="#1a1a25"/>
      <stop offset="100%" stop-color="#08081c"/>
    </radialGradient>
    <radialGradient id="bw-glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#c8a8ff" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Pozadí -->
  <rect width="180" height="180" fill="url(#bw-bg)"/>
  <!-- Jemná lavender aura nahoře -->
  <circle cx="90" cy="60" r="80" fill="url(#bw-glow)"/>

  <!-- ====== MYŠKA — yin-yang B&W ====== -->

  <!-- Levá polovina těla (ČERNÁ) — pomocí mask přes kruh -->
  <defs>
    <clipPath id="leftHalf">
      <rect x="0" y="0" width="90" height="180"/>
    </clipPath>
    <clipPath id="rightHalf">
      <rect x="90" y="0" width="90" height="180"/>
    </clipPath>
  </defs>

  <!-- TĚLO myši (kulaté) -->
  <!-- levá polovina černá -->
  <ellipse cx="90" cy="118" rx="44" ry="36" fill="#0d0d12" stroke="#3a3a4a" stroke-width="1.5" clip-path="url(#leftHalf)"/>
  <!-- pravá polovina bílá -->
  <ellipse cx="90" cy="118" rx="44" ry="36" fill="#f4f4f6" stroke="#c8c8d0" stroke-width="1.5" clip-path="url(#rightHalf)"/>

  <!-- HLAVA myši (kruh) — stejný princip -->
  <circle cx="90" cy="78" r="32" fill="#0d0d12" stroke="#3a3a4a" stroke-width="1.5" clip-path="url(#leftHalf)"/>
  <circle cx="90" cy="78" r="32" fill="#f4f4f6" stroke="#c8c8d0" stroke-width="1.5" clip-path="url(#rightHalf)"/>

  <!-- UŠI — velké, charakteristické -->
  <!-- levé ucho (na hlavě vlevo, na černé straně) -->
  <circle cx="65" cy="50" r="14" fill="#0d0d12" stroke="#3a3a4a" stroke-width="1.5"/>
  <!-- vnitřek levého ucha (růžový) -->
  <circle cx="65" cy="52" r="8" fill="#fbcfe8" opacity="0.85"/>
  <!-- pravé ucho (na bílé straně) -->
  <circle cx="115" cy="50" r="14" fill="#f4f4f6" stroke="#c8c8d0" stroke-width="1.5"/>
  <!-- vnitřek pravého ucha (růžový) -->
  <circle cx="115" cy="52" r="8" fill="#fbcfe8" opacity="0.85"/>

  <!-- OČI — kontrastní k pozadí -->
  <!-- levé oko na černé hlavě = bílé -->
  <circle cx="76" cy="76" r="3.5" fill="#fff"/>
  <circle cx="76" cy="76" r="1.8" fill="#0d0d12"/>
  <!-- pravé oko na bílé hlavě = černé -->
  <circle cx="104" cy="76" r="3.5" fill="#1a1a25"/>
  <circle cx="104" cy="76" r="1.8" fill="#fff"/>

  <!-- ČUMÁK — uprostřed, růžový, na hraně -->
  <ellipse cx="90" cy="92" rx="4" ry="3" fill="#fbcfe8"/>
  <!-- jemné fousky -->
  <line x1="80" y1="93" x2="72" y2="91" stroke="#888" stroke-width="0.7"/>
  <line x1="80" y1="95" x2="72" y2="96" stroke="#888" stroke-width="0.7"/>
  <line x1="100" y1="93" x2="108" y2="91" stroke="#888" stroke-width="0.7"/>
  <line x1="100" y1="95" x2="108" y2="96" stroke="#888" stroke-width="0.7"/>

  <!-- ÚSMĚV — malý oblouček pod čumákem -->
  <path d="M 86 99 Q 90 102 94 99" stroke="#888" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- DĚLICÍ ČÁRA — jemně mezi černou a bílou (vertikální) -->
  <line x1="90" y1="46" x2="90" y2="154" stroke="#666" stroke-width="0.8" opacity="0.4"/>

  <!-- OCAS — vychází zpod těla, zatočený doprava -->
  <path d="M 130 145 Q 156 148 158 130 Q 160 115 148 110" stroke="#888" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Tlapičky -->
  <ellipse cx="68" cy="152" rx="6" ry="3" fill="#0d0d12"/>
  <ellipse cx="112" cy="152" rx="6" ry="3" fill="#f4f4f6" stroke="#c8c8d0" stroke-width="0.8"/>
</svg>
