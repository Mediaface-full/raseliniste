<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="B&W Myš">
  <defs>
    <radialGradient id="bw-bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#2a2a3a"/>
      <stop offset="60%" stop-color="#1a1a25"/>
      <stop offset="100%" stop-color="#08081c"/>
    </radialGradient>
  </defs>

  <rect width="180" height="180" fill="url(#bw-bg)"/>

  <!-- Skupina rotovaná o -90° aby vertikální dělící S-křivka byla správně:
       (klasický yin-yang má S vertikálně, černá ZAUJÍMÁ HORNÍ polovinu) -->
  <g transform="rotate(-90 90 90)">
    <!-- Bílý podklad celého kruhu -->
    <circle cx="90" cy="90" r="70" fill="#f4f4f6"/>

    <!-- Klasická yin-yang černá kapka — large=1 sweep=1,1,0 z W3C example -->
    <path d="M 90 20
             a 70 70 0 1 1 0 140
             a 35 35 0 1 1 0 -70
             a 35 35 0 1 0 0 -70 Z"
          fill="#0d0d12"/>

    <!-- Vnější rámeček -->
    <circle cx="90" cy="90" r="70" fill="none" stroke="#3a3a4a" stroke-width="2.5"/>
  </g>

  <!-- Po rotaci -90°: BÍLÁ kapka je VPRAVO, ČERNÁ je VLEVO.
       Petr chce ČERNOU NAHOŘE → potřebuju rotaci ne -90° ale +90°. Jde o to.
       Vyřeším přes druhou rotaci o -180° celého wrapperu. -->

  <!-- Detaily MYŠÍ — pozice v původním souřadnicovém systému.
       Černá hlava je nahoře (na pozici malého kruhu cx=90 cy=55 PO CELKOVÉ ROTACI).
       Před rotací -90° byl horní malý kruh na (155, 90) → teď po rotaci na (90, 25)... no počkat. -->

  <!-- Oko bílé (na černé kapce nahoře) -->
  <circle cx="90" cy="55" r="9" fill="#f4f4f6"/>
  <circle cx="90" cy="55" r="3" fill="#0d0d12"/>

  <!-- Oko černé (na bílé kapce dole) -->
  <circle cx="90" cy="125" r="9" fill="#1a1a25"/>
  <circle cx="90" cy="125" r="3" fill="#f4f4f6"/>

  <!-- ČERNÁ MYŠ ucho — nahoru z černé hlavy -->
  <path d="M 64 30 L 56 12 L 78 22 Z"
        fill="#0d0d12" stroke="#3a3a4a" stroke-width="1.2"/>
  <path d="M 66 28 L 62 16 L 74 23 Z" fill="#fbcfe8" opacity="0.85"/>
  <!-- Černá myš čumák -->
  <circle cx="55" cy="68" r="2.6" fill="#fbcfe8"/>

  <!-- BÍLÁ MYŠ ucho — dolu z bílé hlavy -->
  <path d="M 116 150 L 124 168 L 102 158 Z"
        fill="#f4f4f6" stroke="#c8c8d0" stroke-width="1.2"/>
  <path d="M 114 152 L 118 164 L 106 157 Z" fill="#fbcfe8" opacity="0.85"/>
  <!-- Bílá myš čumák -->
  <circle cx="125" cy="112" r="2.6" fill="#a78bfa"/>
</svg>
