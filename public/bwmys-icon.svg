<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="B&W Myš">
  <defs>
    <radialGradient id="bw-bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#2a2a3a"/>
      <stop offset="60%" stop-color="#1a1a25"/>
      <stop offset="100%" stop-color="#08081c"/>
    </radialGradient>
  </defs>

  <rect width="180" height="180" fill="url(#bw-bg)"/>

  <!-- Skupina rotovaná o -90° pro vertikální orientaci yin-yang -->
  <g transform="rotate(-90 90 90)">
    <!-- Bílý podklad -->
    <circle cx="90" cy="90" r="70" fill="#f4f4f6"/>

    <!-- Černá kapka (W3C standardní yin-yang path) -->
    <path d="M 90 20
             a 70 70 0 1 1 0 140
             a 35 35 0 1 1 0 -70
             a 35 35 0 1 0 0 -70 Z"
          fill="#0d0d12"/>

    <!-- Vnější rámeček -->
    <circle cx="90" cy="90" r="70" fill="none" stroke="#3a3a4a" stroke-width="2.5"/>
  </g>

  <!-- ============ ČERNÁ MYŠ (hlava nahoře) ============ -->

  <!-- Levé ucho (kulaté) -->
  <ellipse cx="74" cy="38" rx="11" ry="13" fill="#0d0d12" stroke="#3a3a4a" stroke-width="1"/>
  <ellipse cx="74" cy="40" rx="6" ry="8" fill="#fbcfe8" opacity="0.85"/>

  <!-- Pravé ucho -->
  <ellipse cx="106" cy="38" rx="11" ry="13" fill="#0d0d12" stroke="#3a3a4a" stroke-width="1"/>
  <ellipse cx="106" cy="40" rx="6" ry="8" fill="#fbcfe8" opacity="0.85"/>

  <!-- Levé oko -->
  <circle cx="80" cy="58" r="3" fill="#f4f4f6"/>
  <circle cx="80.5" cy="58.5" r="1.4" fill="#0d0d12"/>
  <circle cx="80.8" cy="57.8" r="0.5" fill="#fff"/>

  <!-- Pravé oko -->
  <circle cx="100" cy="58" r="3" fill="#f4f4f6"/>
  <circle cx="100.5" cy="58.5" r="1.4" fill="#0d0d12"/>
  <circle cx="100.8" cy="57.8" r="0.5" fill="#fff"/>

  <!-- Čenich (růžový) -->
  <ellipse cx="90" cy="73" rx="3.5" ry="2.5" fill="#fbcfe8"/>
  <!-- Úsměv -->
  <path d="M 84 78 Q 90 82 96 78" stroke="#fbcfe8" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- ============ BÍLÁ MYŠ (hlava dole, zrcadlově) ============ -->

  <!-- Levé ucho -->
  <ellipse cx="74" cy="142" rx="11" ry="13" fill="#f4f4f6" stroke="#c8c8d0" stroke-width="1"/>
  <ellipse cx="74" cy="140" rx="6" ry="8" fill="#fbcfe8" opacity="0.85"/>

  <!-- Pravé ucho -->
  <ellipse cx="106" cy="142" rx="11" ry="13" fill="#f4f4f6" stroke="#c8c8d0" stroke-width="1"/>
  <ellipse cx="106" cy="140" rx="6" ry="8" fill="#fbcfe8" opacity="0.85"/>

  <!-- Levé oko -->
  <circle cx="80" cy="122" r="3" fill="#1a1a25"/>
  <circle cx="80.5" cy="121.5" r="1.4" fill="#f4f4f6"/>
  <circle cx="80.2" cy="121.2" r="0.5" fill="#fff"/>

  <!-- Pravé oko -->
  <circle cx="100" cy="122" r="3" fill="#1a1a25"/>
  <circle cx="100.5" cy="121.5" r="1.4" fill="#f4f4f6"/>
  <circle cx="100.2" cy="121.2" r="0.5" fill="#fff"/>

  <!-- Čenich (lavender) -->
  <ellipse cx="90" cy="107" rx="3.5" ry="2.5" fill="#a78bfa"/>
  <path d="M 84 102 Q 90 98 96 102" stroke="#a78bfa" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
