<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gideon">
  <defs>
    <radialGradient id="g-bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#2a1f4a"/>
      <stop offset="60%" stop-color="#1a1438"/>
      <stop offset="100%" stop-color="#0a0820"/>
    </radialGradient>
    <radialGradient id="g-glow" cx="50%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#c8a8ff" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g-letter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8dffd"/>
    </linearGradient>
  </defs>

  <!-- Pozadí (iOS si ořízne podle systémové masky) -->
  <rect width="180" height="180" fill="url(#g-bg)"/>

  <!-- Lavender glow nahoře -->
  <circle cx="90" cy="40" r="80" fill="url(#g-glow)"/>

  <!-- Velké serifové G (Georgia bold) -->
  <text x="90" y="128"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="130"
        font-weight="700"
        fill="url(#g-letter)">G</text>
</svg>
